<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاشێری زیرەک</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding: 0; }
        .menu-btn { position: fixed; top: 20px; right: 20px; z-index: 3000; background: #0f172a; color: white; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; right: 0; background: #ffffff; overflow-x: hidden; transition: 0.4s; padding-top: 100px; box-shadow: -5px 0 15px rgba(0,0,0,0.3); z-index: 2500; }
        .sidebar button { display: block; width: 85%; margin: 15px auto; padding: 16px; border: none; border-radius: 12px; background: #e2e8f0; color: #0f172a; font-weight: bold; cursor: pointer; }
        .container { padding: 80px 20px; max-width: 400px; margin: auto; }
        .section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .cart-item, .product-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .total-box { font-size: 1.5em; font-weight: bold; text-align: center; margin: 15px 0; color: #0284c7; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
   /* ستایلی نوێ و مۆدێرن */
.product-item {
    background: #ffffff;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
    position: relative; /* زۆر گرنگە بۆ ئەوەی مێنۆکە لە تەنیشت خۆی بێت */
}

.options-menu {
    display: none;
    position: absolute;
    right: 140px; /* مێنۆکە دەخاتە تەنیشت دوگمەکە */
    top: 0px;
    background: #ffffff;
    border-radius: 8px;
    z-index: 10; /* کەمکراوەتەوە بۆ ئەوەی تێکەڵ نەبێت */
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    width: 100px;
    border: 1px solid #f1f5f9;
}

.options-menu button {
    display: block;
    width: 100%;
    padding: 8px 10px;
    border: none;
    background: none;
    text-align: right;
    font-size: 13px;
    cursor: pointer;
}

.dots-btn {
    cursor: pointer;
    padding: 5px 10px;
    font-size: 20px;
    color: #475569;
}

  </style>
</head>
<body>

<div class="menu-btn" onclick="toggleNav()">☰</div>

<div id="mySidebar" class="sidebar">
    <button onclick="showSection('posSection')">بەشی کاشێر</button>
    <button onclick="showSection('addSection')">تۆمارکردنی کاڵا</button>
    <button onclick="showSection('itemsSection')">تۆمارکراوەکان</button>
    <button onclick="showSection('reportSection')">مێژووی فرۆشتن</button>
</div>

<div class="container">
    <div id="posSection" class="section">
        <h2>سیستەمی کاشێر</h2>
        <button onclick="initScanner()" style="background:#059669; color:white; width:100%; padding:15px; border:none; border-radius:10px;">دەستپێکی سکانەر</button>
      <button id="stopBtn" onclick="stopScanner()" style="background:#dc2626; color:white; width:100%; padding:10px; border:none; border-radius:10px; display:none; margin-top:10px;">داخستنی سکانەر</button>
        <div id="reader" style="width:100%; margin: 15px 0; background:#eee; border-radius:10px; overflow:hidden;"></div>
        <div id="cartList"></div>
        <div class="total-box">کۆی گشتی: <span id="totalPrice">0</span> IQD</div>
        <button onclick="saveSale()" style="background:#8b5cf6; color:white; width:100%; padding:10px; border-radius:10px; border:none; margin-bottom:10px;">تۆمارکردنی فرۆشتن</button>
        <button onclick="printReceipt()" style="background:#f59e0b; color:white; width:100%; padding:10px; border-radius:10px; border:none;">چاپکردنی پسوڵە</button>
    </div>

    <div id="addSection" class="section" style="display:none;">
        <h2>تۆمارکردنی کاڵا</h2>
        <input type="text" id="name" placeholder="ناوی کاڵا">
        <input type="text" id="code" placeholder="بارکۆد">
        <input type="number" id="price" placeholder="نرخ">
        <button onclick="saveProduct()" style="background:#0284c7; color:white; width:100%; padding:15px; border:none; border-radius:10px;">پاشەکەوتکردن</button>
    </div>

    <div id="itemsSection" class="section" style="display:none;">
        <h2>تۆمارکراوەکان</h2>
        <div id="itemsList"></div>
    </div>

    <div id="reportSection" class="section" style="display:none;">
        <h2>مێژووی فرۆشتن</h2>
        <div id="salesList"></div>
    </div>
</div>

<script>
    let cart = [];
    let html5QrCode = new Html5Qrcode("reader");

    function toggleNav() { document.getElementById("mySidebar").style.width = "260px"; }
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById("mySidebar").style.width = "0";
        if(id === 'reportSection') loadSales();
        if(id === 'itemsSection') loadItems();
    }

        function saveProduct() {
        const nameInput = document.getElementById('name');
        const codeInput = document.getElementById('code');
        const priceInput = document.getElementById('price');
        
        const name = nameInput.value;
        const code = codeInput.value;
        const price = priceInput.value;

        if(!name || !code || !price) return alert("تکایە هەموو خانەکان پڕ بکەرەوە");
        
        let products = JSON.parse(localStorage.getItem('myStore')) || [];
        products.push({ name, code, price });
        localStorage.setItem('myStore', JSON.stringify(products));
        
        // ئەم بەشەی خوارەوە خانەکان پاک دەکاتەوە
        nameInput.value = "";
        codeInput.value = "";
        priceInput.value = "";
        
        alert("بە سەرکەوتوویی تۆمارکرا!");
    }


    function loadItems() {
        const list = document.getElementById('itemsList');
        let products = JSON.parse(localStorage.getItem('myStore')) || [];
        list.innerHTML = products.map((p, i) => `
            <div class="product-item">
                <span>${p.name} - ${p.price} IQD</span>
                <button class="del-btn" onclick="deleteItem(${i})">سڕینەوە</button>
            </div>`).join('');
    }

        function editItem(index) {
        let products = JSON.parse(localStorage.getItem('myStore')) || [];
        let p = products[index];
        let newName = prompt("ناوی نوێ:", p.name);
        let newCode = prompt("بارکۆدی نوێ:", p.code);
        let newPrice = prompt("نرخی نوێ:", p.price);
        
        if (newName !== null && newCode !== null && newPrice !== null) {
            products[index] = { name: newName, code: newCode, price: newPrice };
            localStorage.setItem('myStore', JSON.stringify(products));
            loadItems(); // دووبارە لیستەکە تازە دەکاتەوە
        }
    }


        function loadItems() {
        const list = document.getElementById('itemsList');
        let products = JSON.parse(localStorage.getItem('myStore')) || [];
        list.innerHTML = products.map((p, i) => `
            <div class="product-item">
                <div>
                    <strong>${p.name}</strong><br>
                    <small>بارکۆد: ${p.code} | نرخ: ${p.price} IQD</small>
                </div>
                <div class="dots-btn" onclick="toggleMenu(${i})">⋮</div>
                <div id="menu-${i}" class="options-menu">
                    <button onclick="editItem(${i})">دەستکاری</button>
                    <button onclick="deleteItem(${i})" style="color:red;">سڕینەوە</button>
                </div>
            </div>`).join('');
    }

    function toggleMenu(index) {
        document.querySelectorAll('.options-menu').forEach(m => m.style.display = 'none');
        document.getElementById('menu-' + index).style.display = 'block';
    }

    // بۆ ئەوەی هەر کاتێک کلیکت لە دەرەوە کرد مێنۆکە دابخرێت
    window.onclick = function(event) {
        if (!event.target.matches('.dots-btn')) {
            document.querySelectorAll('.options-menu').forEach(m => m.style.display = 'none');
        }
    }


    function updateUI() {
        const list = document.getElementById('cartList');
        list.innerHTML = "";
        let sum = 0;
        cart.forEach((item, index) => {
            sum += (parseFloat(item.price) * item.qty);
            list.innerHTML += `<div class="cart-item"><span>${item.name} (${item.qty}x)</span><span>${item.price * item.qty} IQD</span></div>`;
        });
        document.getElementById('totalPrice').innerText = sum;
    }

    function saveSale() {
        let sales = JSON.parse(localStorage.getItem('mySales')) || [];
        sales.push({ date: new Date().toLocaleString(), total: document.getElementById('totalPrice').innerText });
        localStorage.setItem('mySales', JSON.stringify(sales));
        alert("فرۆشتنەکە تۆمارکرا!");
        cart = []; updateUI();
    }
      function initScanner() {
        document.getElementById('stopBtn').style.display = 'block'; // دوگمەی داخستن دەردەکەوێت
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            // ئیشی سکانەر
            let products = JSON.parse(localStorage.getItem('myStore')) || [];
            let found = products.find(p => p.code === decodedText.trim());
            if(found) {
                let existing = cart.find(item => item.code === found.code);
                if(existing) existing.qty = (existing.qty || 1) + 1;
                else { found.qty = 1; cart.push(found); }
                updateUI();
                stopScanner(); // دوای دۆزینەوەی کاڵاکە، خۆکاری دادەخرێت
            }
        });
    }

    function stopScanner() {
        html5QrCode.stop().then((ignore) => {
            document.getElementById('stopBtn').style.display = 'none'; // دوگمەی داخستن دەشارێتەوە
        }).catch((err) => {
            console.log("هەڵە لە داخستنی کامێرا");
        });
    }


    function loadSales() {
        const list = document.getElementById('salesList');
        let sales = JSON.parse(localStorage.getItem('mySales')) || [];
        list.innerHTML = sales.map(s => `<div>${s.date}: ${s.total} IQD</div>`).join('<hr>');
    }

    function printReceipt() { window.print(); }
</script>
</body>
</html>
